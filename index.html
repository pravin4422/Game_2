<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Game</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="bg-blur"></div>
    <div class="mobile-frame">
        <div class="level-grid">

            <button class="level-btn" onclick="openLevel(4)">4</button>
            <button class="level-btn" onclick="openLevel(5)">5</button>
            <button class="level-btn" onclick="openLevel(6)">6</button>
            <button class="level-btn" onclick="openLevel(7)">7</button>
            <button class="level-btn" onclick="openLevel(8)">8</button>
            <button class="level-btn" onclick="openLevel(9)">9</button>
            <button class="level-btn" onclick="openLevel(10)">10</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
